<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise One</title>
    <style>
        .container{
            display: grid;
            width: 748px;
            height: 748px;
            background: #1A1A1A;
            /* EXACT TRACK SIZES (from image proportions) */
            grid-template-columns: 320px 198px 153px 50px;
            grid-template-rows: 414px 130px 155px 22px;
            gap: 9px;
            }

        /* DEFAULT WHITE */
        .item {
            background: #F7F6F2;
            }

        /* COLORS */
        .red    { background: #D7262E; }
        .blue   { background: #1C3F94; }
        .yellow1, .yellow2, .yellow3 { background: #F2C500; }
        .black  { background: #1A1A1A; }

        /* --- EXACT PLACEMENT --- */
        /* RED (top-left big block) */
        .red {
            grid-column: 1;
            grid-row: 1;
        }
        /* TOP ROW */
        .white1 {
            grid-column: 2 / span 3;
            grid-row: 1;
        }
        /* LEFT VERTICAL WHITE */
        .white2 {
            grid-column: 1;
            grid-row: 2 / span 2;
        }
        /* CENTER WHITE */
        .white3 {
        grid-column: 2 / span 2;
        grid-row: 2;
        }
        /* RIGHT SMALL BLUE */
        .blue {
        grid-column: 4;
        grid-row: 2;
        }
        /* MIDDLE LOWER */
        .white4 {
        grid-column: 3;
        grid-row: 3;
        }
        /* --- YELLOW BLOCKS (3 separate ones as in image) --- */

        /* Main yellow */
        .yellow1 {
        grid-column: 2;
        grid-row: 3;
        }

        /* Small yellow right */
        .yellow2 {
        grid-column: 4;
        grid-row: 3;
        }

        /* Thin yellow bottom */
        .yellow3 {
        grid-column: 2;
        grid-row: 4;
        }

        /* --- BOTTOM ROW --- */
        .white5 {
        grid-column: 1;
        grid-row: 4;
        }

        .white6 {
        grid-column: 3;
        grid-row: 4;
        }

        /* BLACK small block */
        .black {
        grid-column: 4;
        grid-row: 4;
        }/* --- BOTTOM ROW --- */
        .white5 {
        grid-column: 1;
        grid-row: 4;
        }

        .white6 {
        grid-column: 3;
        grid-row: 4;
        }

        /* BLACK small block */
        .black {
        grid-column: 4;
        grid-row: 4;
        }
    </style>
</head>
<body style="margin: 0;
             height: 100vh;
             display: flex;
             justify-content: center;
             align-items: center;
             background: #ddd;">

    <div class="container">
        <div class="item red"></div>

        <div class="item white1"></div>
        <div class="item white2"></div>
        <div class="item white3"></div>
        <div class="item white4"></div>
        <div class="item white5"></div>
        <div class="item white6"></div>

        <div class="item yellow1"></div>
        <div class="item yellow2"></div>
        <div class="item yellow3"></div>

        <div class="item blue"></div>
        <div class="item black"></div>
  </div>
</body>
</html>
