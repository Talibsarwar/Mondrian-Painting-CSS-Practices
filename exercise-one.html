<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise One</title>
    <style>
        .container{
            height: 748px;
            width: 748px;
            display: grid;
            background-color: #000;
            grid-template-columns: 89px 102px 99px 210px 129px 129px 37px;
            grid-template-rows: 92px 213px 210px 95px 95px 48px 35px;
            gap: 9px;
        }
        .item{
            background-color: #E1E3CC;
        }
        .unique-grey{
        background-color: #D1D1CF;
        }
        .grey1{
            background-color: #EFF6EF;
        }

        .grey2{
            background-color: #EFF6EF;
        }

        .grey3{
            background-color: #EFF6EF;
        }
        .grey4{
            background-color: #EFF6EF;
        }
        .dark-grey1{
            background-color: #C4BDB8;
        }
        .dark-grey2{
            background-color: #C4BDB8;
        }
        .yellow1
        {
            background-color: #F6D469;
        }
        .yellow2{
            background-color: #F6D469;
        }
        .yellow3{
            background-color: #F6D469;
        }
        .red1{
            background-color: #E23125;
        }
        .red2{
            background-color: #E23125;
        }
        .black1{
            background-color: #1C0C09;
        }
        .black2{
            background-color: #1C0C09;
        }
        .blue{
            background-color: #260F9A;
        }
    </style>
</head>
<body style="display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 0;">
    <div class="container">
        <div class="item grey1"></div>
        <div class="item white1"></div>
        <div class="item yellow1"></div>
        <div class="item white2"></div>

        <div class="item grey2"></div>
        <div class="item red1"></div>
        <div class="item yellow2"></div>

        <div class="item grey3"></div>
        <div class="item black1"></div>
        <div class="item dark-grey1"></div>
        <div class="item grey4"></div>

        <div class="item yellow3"></div>
        <div class="item dark-grey2"></div>
        <div class="item blue"></div>
        <div class="item red2"></div>

        <div class="item white3"></div>
        <div class="item black2"></div>
        <div class="item unique-grey"></div>
    </div>
</body>
</html>
