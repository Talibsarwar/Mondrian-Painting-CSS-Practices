<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise One</title>
    <style>
        .container{
            display: grid;
            background: #1A1A1A;
            /* EXACT TRACK SIZES (from image proportions) */
            grid-template-columns: 90px 90px 105px 213px 126px 126px 36px;
            grid-template-rows: 202px 210px 211px 100px 94px 57px 34px;
            gap: 9px;
            }

        /* DEFAULT WHITE */
        .item {
            background: #F7F6F2;
            }

        /* COLORS */
        .red, .red1 { background: #D7262E; }
        .blue { background: #1C3F94; }
        .yellow1, .yellow2, .yellow3 { background: #F2C500; }
        .black, .black1 { background: #1A1A1A; }
        .grey1, .grey2, .grey3 {background-color: #C9CAC4;}

        /* --- EXACT PLACEMENT --- */
        /* White (top-left big block) */
        .white1 {
        grid-column: 1 / span 2;
        grid-row: 1;
        }
        /* TOP ROW */
        .white2 {
            grid-column: 3 / span 2;
            grid-row: 1;
        }
        .yellow1 {
            grid-column: 5 / span 2;
            grid-row: 1;
        }
        /* Right VERTICAL WHITE */
        .white3 {
            grid-column: 7;
            grid-row: 1 / span 4;
        }
        /* LEFT VERTICAL WHITE */
        .white6 {
        grid-column: 1;
        grid-row: 3 / span 2;
        }

        .white8{
            grid-column: 1;
            grid-row: 2;
        }
        /* LEFT VERTICAL YELLOW */
        .yellow3 {
            grid-column: 1;
            grid-row: 5 / span 3;
        }
        /* CENTER Red */
        .red {
            grid-column: 2 / span 3;
            grid-row: 2 / span 2;
            }

        /* Yellow Next to Center Red (Right Side)*/
        .yellow2 {
            grid-column: 5 / span 2;
            grid-row: 2;
        }
        /* White Next to Center Red (Right Side)*/
        .white4 {
            grid-column: 5;
            grid-row: 3;
        }
        /* WHITE BOTTOM LEFT SECOND ROW */
        .white7{
            grid-column: 5 / span 2;
            grid-row: 4;
        }
        /* WHITE RIGHT AFTER ANOTHER WHITE Next to Center Red (Right Side)*/
        .white5 {
            grid-column: 6;
            grid-row: 3;
        }
        .black {
        grid-column: 2 / span 2;
        grid-row: 4 / span 2;
        }
        /* GREY BOTTOM LEFT RIGHT AFTER MERGED BLACK BOTTOM*/
        .grey1{
            grid-column: 4;
            grid-row: 4;
        }
        .grey2{
            grid-column: 4;
            grid-row: 5;
        }
        /* RIGHT SMALL BLUE */
        .blue {
        grid-column: 5 / span 2;
        grid-row: 5  / span 2;
        }
        /* RIGHT BOTTOM VERTICAL RED */
        .red1 {
            grid-column: 7;
            grid-row: 5 / span 3;
        }
        /* LOWER BOTTOM BLACK */
        .black1 {
            grid-column: 4;
            grid-row: 6;
        }
        /* LEFT BOTTOM WHITE */
        .white8{
            grid-column: 2 / span 2;
            grid-row: 6 / span 2;
        }
        /* BOTTOM GREY */
        .grey3{
            grid-column: 4 / span 3;
            grid-row: 7;
        }
        
    </style>
</head>
<body style="margin: 0;
             height: 100vh;
             display: flex;
             justify-content: center;
             align-items: center;
             background: #ddd;">

    <div class="container">
        <div class="item white1"></div>
        <div class="item white2"></div>
        <div class="item yellow1"></div>
        <div class="item white3"></div>

        <div class="item white5"></div>
        <div class="item white8"></div>
        <div class="item red"></div>
        <div class="item yellow2"></div>
        <div class="item white6"></div>
        <div class="item white7"></div>

        <div class="item white4"></div>
        <div class="item yellow3"></div>

        <div class="item blue"></div>
        <div class="item grey1"></div>
        <div class="item grey2"></div>
        <div class="item red1"></div>
        <div class="item black"></div>
        <div class="item white9"></div>
        <div class="item grey3"></div>
        <div class="item black1"></div>
  </div>
</body>
</html>
